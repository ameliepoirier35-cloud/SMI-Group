<html lang="fr">
<head>
<meta charset="UTF-8">

<title>SMI Mutuelle · Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{display:none;}
html{scrollbar-width:none;}

/* ─────────────────────────────────────────
   COLOR TOKENS
───────────────────────────────────────── */
:root{
  --bg:#f8f9fa; --card:#fff; --card-b:transparent;
  --blue1:#fa0000; --blue2:#9b0000; --blue3:#4b0000; --blue5:#c80000; --blue6:#c80000; --blue7:#fa0000; --blue9:#4b0000;
  --lb1:#fdb0b0; --lb2:#fc7d7d; --lb3:#fee3e3; --lb4:#fee3e3; --lb5:#fff5f5;
  --lime1:#fa0000; --lime2:#9b0000; --lime3:#4b0000; --lime4:#fee3e3;
  --td:#3d3d3d; --td2:#1c1c1c; --td3:#141414; --tm:#9a9a9a; --tm2:#777777;
  --red1:#ef4444; --red2:#dc2626; --red-bg:#fff5f5; --red-br:#fca5a5; --red-ibg:#fee2e2;
  --am1:#fbbf36; --am2:#c47a00; --am-bg:#fffbeb; --am-br:#fcd34d; --am-ibg:#fef3c7;
  --tip-h:#fff9f0; --coach-bg1:#fff1f1;
  --sep:#f1f3f5; --input-bg:#f8f9fa;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --sh2:0 1px 2px rgba(0,0,0,.05);
  --nav-sh:0 -1px 0 #f1f3f5;
  --hero:linear-gradient(115.5deg,#fa0000 5.8%,#4b0000 118.5%);
  --ob:linear-gradient(126deg,#fa0000 26.8%,#c80000 71.2%,#4b0000 100%);
  --coach:linear-gradient(150deg,#fa0000 26.8%,#c80000 71.2%,#4b0000 100%);
}
.dark{
  --bg:#0d1117; --card:#161b22; --card-b:#21262d;
  --blue1:#fb4545; --blue2:#fa0000; --blue5:#fc7d7d; --blue6:#fb4545; --blue7:#fa0000; --blue9:#c9d1d9;
  --lb1:#3a0f0f; --lb2:#3a1414; --lb3:#2a0808; --lb4:#2a0808; --lb5:#161b22;
  --lime2:#fb4545; --lime3:#fa0000;
  --td:#c9d1d9; --td2:#e6edf3; --td3:#f0f6fc; --tm:#8b949e; --tm2:#8b949e;
  --red1:#f85149; --red2:#da3633; --red-bg:#1a0000; --red-br:#6e3630; --red-ibg:#2d1515;
  --am2:#d29922; --am-bg:#1a1500; --am-br:#6e5e1a; --am-ibg:#2d2a15;
  --tip-h:#1a1500; --coach-bg1:#1a0808; --sep:#21262d; --input-bg:#0d1117;
  --lime4:#2a0808; --am1:#d4a017; --lime1:#fb4545;
  --sh:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.25);
  --sh2:0 1px 2px rgba(0,0,0,.2);
  --nav-sh:0 -1px 0 #21262d;
  --hero:linear-gradient(115.5deg,#fa0000 5.8%,#0d1117 118.5%);
  --ob:linear-gradient(126deg,#fa0000 26.8%,#0d1117 71.2%,#010409 100%);
  --coach:linear-gradient(150deg,#fa0000 26.8%,#0d1117 71.2%,#010409 100%);
}

/* ─────────────────────────────────────────
   ANIMATION SYSTEM — REVOLUT PRINCIPLES

   Rule 1: The PAGE slides in. Items do NOT.
   Rule 2: Numbers count up. Bars grow up. That's it.
   Rule 3: Press feedback is instant (<80ms).
   Rule 4: No translateY on list items. Never.
   Rule 5: One easing: cubic-bezier(0.25,1,0.5,1)
───────────────────────────────────────── */
:root{ --ease: cubic-bezier(0.25,1,0.5,1); }

/* ① Page-level slide — the only "entrance" animation for content */
@keyframes page-fwd {
  from { transform: translateX(32px); opacity: 0.6; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes page-back {
  from { transform: translateX(-24px); opacity: 0.7; }
  to   { transform: translateX(0);     opacity: 1; }
}
/* Applied via JS to #pb */
.entering-fwd  { animation: page-fwd  230ms var(--ease) both; }
.entering-back { animation: page-back 200ms var(--ease) both; }

/* ② Hero card — only the topmost card on Dashboard gets a subtle entrance */
@keyframes hero-enter {
  from { opacity: 0; transform: scale(0.975); }
  to   { opacity: 1; transform: scale(1); }
}
.hero-card { animation: hero-enter 360ms var(--ease) 60ms both; }

/* ⑤ Live status pulse — subtle opacity only, never scale */
@keyframes bar-grow {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}
/* Applied inline per bar with tiny stagger (≤20ms per item) */

/* ⑤ Live status pulse — subtle opacity only, never scale */
@keyframes live-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.38; }
}
.live-dot { animation: live-pulse 2.2s ease-in-out infinite; }

/* ⑥ Call connecting — expanding rings, the only "looping" animation */
@keyframes ring-expand {
  0%   { transform: translate(-50%,-50%) scale(0.9); opacity: 0.5; }
  100% { transform: translate(-50%,-50%) scale(2.6); opacity: 0; }
}
/* Applied inline with different delays per ring */

/* ⑦ Connecting dots wave */
@keyframes dot-wave {
  0%, 70%, 100% { transform: scale(0.5); opacity: 0.2; }
  35%            { transform: scale(1);   opacity: 1;   }
}

/* ⑧ Onboarding — the single screen where items stagger (first impression only) */
@keyframes ob-enter {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* ─────────────────────────────────────────
   INTERACTION — instant, precise
───────────────────────────────────────── */
.tap {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 70ms ease, opacity 70ms ease;
  will-change: transform;
}
.tap:active { transform: scale(0.95); opacity: 0.82; }

.tap-btn {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 70ms ease, opacity 70ms ease;
}
.tap-btn:active { transform: scale(0.96); opacity: 0.88; }

.tap-row {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 80ms ease;
}
.tap-row:active { background: var(--sep) !important; }

/* Chip pill — only color transitions, no movement */
.chip {
  border-radius: 14px; padding: 6px 14px; font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  font-family: 'Plus Jakarta Sans', sans-serif;
  border: 1px solid var(--sep); background: var(--card); color: var(--td);
  -webkit-tap-highlight-color: transparent;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
}
.chip.active { background: var(--blue1); color: #fff; border-color: var(--blue1); font-weight: 700; }

/* Flip card — cinematic spring flip */
.flip-card { perspective: 1100px; cursor: pointer; }
.flip-inner {
  position: relative; width: 100%;
  transform-style: preserve-3d;
  transition: transform 800ms cubic-bezier(0.35, 0, 0.1, 1.3);
}
.flip-inner.flipped { transform: rotateY(180deg); }
.flip-front, .flip-back {
  backface-visibility: hidden;
  border-radius: 20px; width: 100%;
  overflow: hidden;
}
/* Shimmer — wider band, slower sweep */
.flip-front::after, .flip-back::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.22) 50%, transparent 70%);
  transform: translateX(-130%);
  transition: transform 0ms;
  pointer-events: none;
  border-radius: 20px;
}
.flip-inner.flipping .flip-front::after,
.flip-inner.flipping .flip-back::after {
  transform: translateX(130%);
  transition: transform 900ms cubic-bezier(0.4, 0, 0.2, 1);
}
.flip-back { transform: rotateY(180deg); position: absolute; top: 0; left: 0; }

/* ─────────────────────────────────────────
   DESKTOP WRAPPER
───────────────────────────────────────── */
body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: #05080f;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.desktop-bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 55% 45% at 20% 35%, rgba(2,132,200,.13) 0%, transparent 70%),
    radial-gradient(ellipse 45% 55% at 80% 70%, rgba(1,65,98,.18) 0%, transparent 65%),
    #05080f;
}
.desktop-bg::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 44px 44px;
}
.desktop-label { position: fixed; top: 22px; left: 26px; color: rgba(255,255,255,.18); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; z-index: 100; }
.desktop-badge { position: fixed; top: 22px; right: 26px; background: rgba(2,132,200,.1); border: 1px solid rgba(2,132,200,.25); color: rgba(2,132,200,.6); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; z-index: 100; padding: 5px 12px; border-radius: 20px; }
.desktop-hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.12); font-size: 10px; text-align: center; white-space: nowrap; z-index: 100; }

/* ─────────────────────────────────────────
   IPHONE SHELL
───────────────────────────────────────── */
.phone-shell {
  position: relative; z-index: 10;
  width: 393px; height: 852px;
  background: linear-gradient(160deg,#2c2c2e,#1c1c1e);
  border-radius: 55px; padding: 14px;
  box-shadow:
    0 0 0 1.5px rgba(255,255,255,.08),
    0 0 0 3px #101012,
    0 70px 140px rgba(0,0,0,.9),
    0 24px 48px rgba(0,0,0,.55),
    inset 0 0 0 1px rgba(255,255,255,.04);
  flex-shrink: 0;
}
.pb { position: absolute; background: linear-gradient(90deg,#2e2e30,#1e1e20); border-radius: 2px; }
.pb-r { right: -3.5px; width: 3.5px; }
.pb-r.lock { top: 152px; height: 70px; border-radius: 0 3px 3px 0; }
.pb-l { left: -3.5px; width: 3.5px; border-radius: 3px 0 0 3px; }
.pb-l.sil { top: 108px; height: 30px; }
.pb-l.v1  { top: 156px; height: 56px; }
.pb-l.v2  { top: 226px; height: 56px; }

.phone-screen {
  width: 100%; height: 100%;
  border-radius: 43px; overflow: hidden;
  background: var(--bg); position: relative;
  display: flex; flex-direction: column;
  transition: background 200ms ease;
}
.di { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 36px; background: #000; border-radius: 22px; z-index: 60; }
.status-bar {
  height: 52px; padding: 14px 26px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; position: absolute; top: 0; left: 0; right: 0;
  z-index: 50; background: transparent; pointer-events: none;
  transition: background 200ms ease;
}
.status-bar.white .st-time, .status-bar.white .st-icons { color: #fff !important; }
/* Push screen content down so it starts below the status bar */
.screen-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-top: 52px; display: flex; flex-direction: column; }
/* #pb and its direct child fill height so nav-bar is always at the bottom */
#pb { flex: 1; display: flex; flex-direction: column; }
#pb > div { flex: 1; display: flex; flex-direction: column; }
.st-time { font-size: 15px; font-weight: 700; letter-spacing: -.5px; color: var(--td2); }
.st-icons { display: flex; align-items: center; gap: 5px; color: var(--td2); }

/* ─────────────────────────────────────────
   SHARED COMPONENTS
───────────────────────────────────────── */
.app-header {
  background: var(--card); padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--card-b);
  position: sticky; top: 0; z-index: 20;
  box-shadow: var(--sh2);
  /* Natural height — no inflation for status bar */
}
/* Nav bar */
.nav-bar {
  background: var(--card);
  box-shadow: var(--nav-sh);
  display: flex; justify-content: space-around; align-items: flex-end;
  padding: 10px 0 24px;
  position: sticky; bottom: 0; z-index: 10;
  border-top: 1px solid var(--card-b);
  overflow: visible;
  margin-top: auto;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; padding: 0 12px;
  position: relative; font-family: 'Plus Jakarta Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
  transition: transform 70ms ease;
}
.nav-btn:active { transform: scale(0.88); }
.nav-lbl { font-size: 9px; font-weight: 500; }
/* Active indicator — no animation, just appears */
.nav-pip { position: absolute; bottom: -14px; height: 3px; border-radius: 2px; width: 20px; background: var(--blue1); }

.btn {
  width: 100%; padding: 15px 12px; border-radius: 26px;
  border: 1px solid rgba(255,255,255,.2); background: var(--blue2);
  color: #fff; font-weight: 800; font-size: 14px; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: block; text-align: center; letter-spacing: -.1px;
  -webkit-tap-highlight-color: transparent;
  transition: transform 70ms ease, opacity 70ms ease;
}
.btn:active { transform: scale(0.97); opacity: .88; }
.btn.outline { background: transparent; border: 1.5px solid var(--blue1); color: var(--blue1); }
.btn.sm { padding: 10px 12px; font-size: 12px; border-radius: 20px; }

.card { background: var(--card); border-radius: 20px; box-shadow: var(--sh); overflow: hidden; border: 1px solid var(--card-b); }
.bdg { display: inline-block; padding: 3px 9px; border-radius: 10px; font-size: 10px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; }
.ic-circle { border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.chat-area { padding: 12px; max-height: 185px; overflow-y: auto; background: var(--input-bg); }
.chat-bubble { padding: 10px 14px; border-radius: 12px; max-width: 74%; font-size: 11px; line-height: 1.4; }
.chat-bot { background: var(--card); color: var(--td); border: 1px solid var(--card-b); }
.chat-user { background: var(--blue2); color: #fff; font-weight: 600; }
/* New chat bubble enters — only bubbles get a tiny entrance (they're new content appearing) */
@keyframes bubble-in {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.bubble-new { animation: bubble-in 200ms var(--ease) both; }

.call-ctrl { display: flex; flex-direction: column; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: transform 70ms ease, opacity 70ms ease; -webkit-tap-highlight-color: transparent; }
.call-ctrl:active { transform: scale(0.88); opacity: .85; }

/* ─────────────────────────────────────────
   MOBILE DEVICE (width < 500px)
   Strip the iPhone shell, fill the screen
───────────────────────────────────────── */
@media (max-width: 499px) {
  /* Allow the page body to fill the screen naturally */
  body {
    display: block;
    overflow: hidden;
    background: var(--bg);
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  /* Hide decorative desktop elements */
  .desktop-bg,
  .desktop-label,
  .desktop-badge,
  .desktop-hint { display: none !important; }

  /* The wrapper div: fill the full visual viewport */
  body > div:not(.desktop-bg):not(.desktop-label):not(.desktop-badge):not(.desktop-hint) {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    height: 100dvh;
    z-index: 10;
    overflow: hidden;
  }

  /* Flatten the iPhone shell */
  .phone-shell {
    width: 100%;
    height: 100%;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    background: none;
  }

  /* Hide the physical side buttons */
  .pb { display: none !important; }

  /* Flatten the screen and make it a flex column filling 100% */
  .phone-screen {
    border-radius: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Hide the Dynamic Island notch */
  .di { display: none !important; }

  /* Replace simulated status bar with a real safe-area spacer */
  #sb {
    display: block !important;
    height: env(safe-area-inset-top, 0px);
    min-height: 0;
    padding: 0;
    background: var(--card);
    flex-shrink: 0;
    position: static !important;
    /* hide the time/icons — they duplicate the real iOS status bar */
    visibility: hidden;
    pointer-events: none;
  }

  /* screen-content: no top padding (status bar replaced by safe-area spacer) */
  .screen-content {
    padding-top: 0 !important;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    min-height: 0; /* critical: allows flex child to shrink and scroll */
    /* Keep as flex column so immersive screens (teleconsult) can fill height with flex:1 */
  }

  /* #pb: flex column so both scrollable and immersive screens work */
  #pb { display: flex !important; flex-direction: column; min-height: 100%; }

  /* Normal page divs: block layout, scroll via parent */
  #pb > div:not(.immersive-screen) { flex: none !important; display: block !important; }

  /* Immersive screens (tele connecting/call): fill the remaining space */
  #pb > div.immersive-screen { flex: 1 !important; display: flex !important; min-height: 0; }

  /* Bottom nav: push content above the home indicator */
  .nav-bar {
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 16px)) !important;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
  }
}
</style>
</head>

// ── COUNTER ANIMATION ─────────────────────────
// Revolut's signature: key numbers count up on screen entry
function countUp(el, to, pre='', suf='', dur=750){
  if(!el) return;
  const ease = t => 1 - Math.pow(1-t, 3); // ease-out cubic
  const start = performance.now();
  const tick = now => {
    const p = Math.min(1, (now-start)/dur);
    el.textContent = pre + Math.round(ease(p)*to) + suf;
    if(p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

// ── POST-RENDER HOOK ──────────────────────────
function postRender(){
  // Trigger all counters
  document.querySelectorAll('[data-count]').forEach(el=>{
    countUp(el, +el.dataset.count, el.dataset.pre||'', el.dataset.suf||'');
  });
  // Bind chat input
  const inp = document.getElementById('chat-input');
  if(inp){
    inp.addEventListener('input', e=>S.chatInput=e.target.value);
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') handleAction('sendChat'); });
  }
  // Scroll chat area to bottom (chat messages), not the page
  const ca = document.getElementById('chat-area');
  if(ca) ca.scrollTop = ca.scrollHeight;
  // Bind declaration flow inputs
  if(S.screen==='decl-new' && S.declStep===2) bindDeclInputs();
  // Restore local video stream if in call
  if(S.screen==='teleconsultation' && S.ts==='call' && S.stream){
    const v = document.getElementById('lv');
    if(v) v.srcObject = S.stream;
  }
  // Always reset page scroll to top on every screen/tab change
  scrollTop();
}

// ── NAVIGATION ────────────────────────────────
function scrollTop(){ const sc=document.querySelector('.screen-content'); if(sc) sc.scrollTop=0; }
function go(screen, tab=null, dir='forward'){
  stopCall();
  if(S.screen !== screen) S.prevScreen = S.screen; // remember where we came from
  S.screen=screen;
  if(tab) S.tab=tab;
  render(dir);
}
function goBack(dest){
  // If a specific dest is given use it, otherwise go to prevScreen
  go(dest || S.prevScreen || 'dashboard', null, 'back');
}
function goTab(t){ S.tab=t; S.prevScreen=S.screen; S.screen=TAB_MAP[t]; render('instant'); }

// ── CALL ──────────────────────────────────────
function startCallTimer(){
  S.callSecs=0; S.callDisplay='00:00';
  S.callInterval=setInterval(()=>{
    S.callSecs++;
    const m=Math.floor(S.callSecs/60), s=S.callSecs%60;
    S.callDisplay=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const el=document.getElementById('call-timer');
    if(el) el.textContent=S.callDisplay;
  },1000);
}
function stopCall(){
  if(S.callInterval){ clearInterval(S.callInterval); S.callInterval=null; }
  if(S.stream){ S.stream.getTracks().forEach(t=>t.stop()); S.stream=null; }
}
async function startWebcam(){
  try{
    S.stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    const v=document.getElementById('lv');
    if(v) v.srcObject=S.stream;
  }catch(e){ console.log('No webcam'); }
}

// ── POST-RENDER: bind detail inputs in step 2
function bindDeclInputs(){
  const amt=document.getElementById('decl-amount');
  const dt=document.getElementById('decl-date');
  const prc=document.getElementById('decl-prac');
  if(amt) amt.addEventListener('input',e=>{ S.declAmount=e.target.value; const b=document.getElementById('decl-next-btn'); if(b) b.style.opacity=e.target.value?'1':'.4'; });
  if(dt) dt.addEventListener('input',e=>{ S.declDate=e.target.value; if(dt) dt.style.borderColor=e.target.value?'var(--blue1)':'var(--sep)'; });
  if(prc) prc.addEventListener('input',e=>{ S.declPrac=e.target.value; if(prc) prc.style.borderColor=e.target.value?'var(--blue1)':'var(--sep)'; });
}
function render(dir='instant'){
  const pb = document.getElementById('pb');
  const ps = document.getElementById('ps');
  const sb = document.getElementById('sb');

  // Theme
  if(S.dark) ps.classList.add('dark'); else ps.classList.remove('dark');

  // Clock
  const n=new Date();
  const st=document.getElementById('st');
  if(st) st.textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;

  // Status bar color for immersive screens
  const isWhite=(S.screen==='teleconsultation' && ['connecting','call'].includes(S.ts));
  const isTeleProgram = S.screen==='teleconsultation' && S.teleProgram;
  sb.className=`status-bar${isWhite?' white':''}`;
  // On normal screens: status bar gets card background so it visually merges with the header
  // On onboarding/immersive: transparent so the gradient bleeds through
  sb.style.background = isWhite ? 'transparent' : 'var(--card)';
  sb.style.boxShadow  = isWhite ? 'none' : 'none'; // no shadow, just bg fill

  // Render content
  const screens={onboarding:renderOnboarding,dashboard:renderDashboard,declarations:renderDeclarations,coach:renderCoach,messagerie:renderMessagerie,profil:renderProfil,geoloc:renderGeoloc,teleconsultation:renderTeleconsultation,'decl-new':renderDeclNew};
  const fn=screens[S.screen];
  if(!fn) return;

  pb.innerHTML=fn();

  // Page-level slide animation — THE only animation for navigation
  pb.style.animation='none';
  void pb.offsetWidth; // force reflow to reset animation
  if(dir==='forward'){
    pb.style.animation='page-fwd 230ms var(--ease) both';
  } else if(dir==='back'){
    pb.style.animation='page-back 200ms var(--ease) both';
  }
  // 'instant': no animation — dark mode, filter changes, etc.

  postRender();
}

// ═══════════════════════════════════════════════
//  EVENT HANDLING
// ═══════════════════════════════════════════════
function handleAction(action, val){
  switch(action){
    case 'go': go(val,'', 'forward'); break;
    case 'goBack': goBack(val||null); break;
    case 'goTab': goTab(val); break;
    case 'goTele': S.ts='list'; go('teleconsultation','','forward'); break;
    case 'newDecl':
      S.declStep=0; S.declType=null; S.declUploaded=false;
      S.declAmount=''; S.declDate=''; S.declPrac='';
      go('decl-new','','forward'); break;
    case 'declSetType': S.declType=val; render('instant'); break;
    case 'declSimUpload': S.declUploaded=true; render('instant'); break;
    case 'declNext':
      // Validate step before advancing
      if(S.declStep===0 && !S.declType) break;
      if(S.declStep===1 && !S.declUploaded) break;
      S.declStep++; render('forward'); break;
    case 'declBack':
      if(S.declStep===0){ goBack('declarations'); break; }
      S.declStep--; render('back'); break;
    case 'declSubmit': S.declStep=4; render('forward'); break;
    case 'toggleDark': S.dark=!S.dark; render('instant'); break;
    case 'setDf': S.df=val; render('instant'); break;
    case 'setMt': S.mt=val; render('instant'); break;
    case 'setGf': S.gf=val; render('instant'); break;
    case 'flipCard':{
      S.cardFlipped = !S.cardFlipped;
      // Toggle directly on the live element — do NOT re-render (would kill CSS transition)
      const inner = document.querySelector('.flip-inner');
      if(inner){
        inner.classList.toggle('flipped', S.cardFlipped);
        inner.classList.add('flipping');
        setTimeout(()=>inner.classList.remove('flipping'), 920);
      }
      break;
    }
    case 'setRat': S.rat=parseInt(val); render('instant'); break;
    case 'selectDoctor': S.selectedDoctor=parseInt(val); render('instant'); break;
    case 'setTeleSpec':
      S.teleSpec=val;
      // Filter doctors by specialty
      render('instant'); break;
    case 'setTeleProg': S.teleProgram=val; render('forward'); break;
    case 'closeProg': S.teleProgram=null; render('back'); break;
    case 'startCall':
      S.ts='connecting'; render('forward');
      setTimeout(async()=>{ S.ts='call'; render('instant'); startCallTimer(); await startWebcam(); },3500);
      break;
    case 'cancelCall': S.ts='list'; stopCall(); render('back'); break;
    case 'endCall': S.ts='ended'; stopCall(); render('forward'); break;
    case 'toggleMic': S.micOn=!S.micOn; render('instant'); break;
    case 'toggleCam': S.camOn=!S.camOn; render('instant'); break;
    case 'sendChat':{
      const inp=document.getElementById('chat-input');
      const txt=(inp?inp.value:S.chatInput).trim();
      if(!txt) break;
      S.chat.push({f:'u',t:txt}); S.chatInput='';
      render('instant');
      setTimeout(()=>{ S.chat.push({f:'b',t:'Je vérifie cela pour vous…'}); render('instant');
        setTimeout(()=>{ S.chat[S.chat.length-1]={f:'b',t:'Voici les informations concernant votre demande. N\'hésitez pas pour toute autre question !'}; render('instant'); },1200);
      },700);
      break;
    }
    case 'sendChatMsg':
      S.chat.push({f:'u',t:val}); render('instant');
      setTimeout(()=>{ S.chat.push({f:'b',t:'Recherche en cours…'}); render('instant');
        const answers={'Ma couverture optique ?':'Optique : 300€/an de plafond. Il vous reste 300€ disponibles pour 2026 !','Soins dentaires ?':'Dentaire : remboursement à 150% du tarif sécu pour les soins courants.','Comment déclarer ?':'Onglet Déclarations → photo de la facture → Envoyer. Remboursement sous 48h !'};
        setTimeout(()=>{ S.chat[S.chat.length-1]={f:'b',t:answers[val]||'Je regarde ça pour vous !'}; render('instant'); },900);
      },600);
      break;
  }
}

// Single delegated listener — one handler for the entire phone screen.
// Previously having two listeners (#pb bubble + #ps capture) caused every
// action to fire twice, cancelling toggles (dark mode, flip card, notif).
document.getElementById('ps').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(el&&el.dataset.action) handleAction(el.dataset.action, el.dataset.val||'');
});

// Clock tick
setInterval(()=>{ const n=new Date(),el=document.getElementById('st'); if(el) el.textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; },30000);

// Boot
render('forward');
</script>
